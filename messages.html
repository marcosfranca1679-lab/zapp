<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z PLAYER - Mensagens</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #041c55 0%, #0e0d39 100%);
            padding: 20px 16px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.5);
        }
        .header-icon {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .header p { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
        .container { padding: 16px; max-width: 600px; margin: 0 auto; }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.4);
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
        .empty h2 { font-size: 18px; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
        .empty p { font-size: 14px; color: rgba(255,255,255,0.3); }
        .msg-card {
            background: #161b22;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .msg-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
        .badge-global { background: rgba(37,99,235,0.2); color: #60a5fa; }
        .badge-personal { background: rgba(34,197,94,0.2); color: #4ade80; }
        .msg-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .msg-body {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            line-height: 1.6;
        }
        .msg-date {
            font-size: 11px;
            color: rgba(255,255,255,0.25);
            margin-top: 10px;
        }
        .error {
            text-align: center;
            padding: 40px 20px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 12px;
            margin-top: 20px;
        }
        .error p { color: #fca5a5; font-size: 14px; }

        /* Embedded Style (when shown inside dashboard card) */
        body.embedded {
            background: transparent !important;
            min-height: auto;
        }
        body.embedded .header {
            display: none !important;
        }
        body.embedded .container {
            padding: 4px 0 !important;
            height: 140px;
            overflow-y: auto;
        }
        body.embedded .msg-card {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
        }
        body.embedded .loading {
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon">🔔</div>
        <div>
            <h1>Mensagens</h1>
            <p>Notificações do administrador</p>
        </div>
    </div>
    <div class="container">
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Carregando mensagens...</p>
        </div>
        <div id="content" style="display:none"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jgfgtapavgupabiujpxc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JonsJCMpzpa7XhvvImLYVQ_XBTQc8hK';

        function getMac() {
            const params = new URLSearchParams(window.location.search);
            return params.get('mac') || 'unknown';
        }

        const isEmbedded = new URLSearchParams(window.location.search).get('embedded') === 'true';
        if (isEmbedded) {
            document.body.classList.add('embedded');
        }

        function formatDate(iso) {
            try {
                const d = new Date(iso);
                return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
            } catch(e) { return iso; }
        }

        async function loadMessages() {
            const mac = getMac();
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');

            try {
                // Fetch global messages (target_user is null) AND messages for this MAC
                const url = `${SUPABASE_URL}/rest/v1/notifications?is_active=eq.true&or=(target_user.is.null,target_user.eq.${encodeURIComponent(mac)})&order=created_at.desc`;

                const res = await fetch(url, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!res.ok) throw new Error('Erro ao carregar: ' + res.status);

                const msgs = await res.json();
                loading.style.display = 'none';
                content.style.display = 'block';

                if (!msgs || msgs.length === 0) {
                    if (typeof AndroidMessage !== 'undefined') {
                        AndroidMessage.showCard(false);
                    }
                    content.innerHTML = `
                        <div class="empty">
                            <div class="empty-icon">📭</div>
                            <h2>Sem mensagens</h2>
                            <p>Nenhuma notificação disponível no momento.</p>
                        </div>`;
                    return;
                }

                if (typeof AndroidMessage !== 'undefined') {
                    AndroidMessage.showCard(true);
                }

                content.innerHTML = msgs.map(msg => `
                    <div class="msg-card">
                        <div class="msg-badge ${msg.target_user ? 'badge-personal' : 'badge-global'}">
                            ${msg.target_user ? '👤 Pessoal' : '📢 Geral'}
                        </div>
                        <div class="msg-title">${escapeHtml(msg.title)}</div>
                        <div class="msg-body">${escapeHtml(msg.message)}</div>
                        <div class="msg-date">${formatDate(msg.created_at)}</div>
                    </div>
                `).join('');

            } catch(err) {
                if (typeof AndroidMessage !== 'undefined') {
                    AndroidMessage.showCard(false);
                }
                loading.style.display = 'none';
                content.style.display = 'block';
                content.innerHTML = `
                    <div class="error">
                        <p>⚠️ Não foi possível carregar as mensagens.</p>
                        <p style="margin-top:8px;font-size:12px;opacity:0.7">${err.message}</p>
                    </div>`;
            }
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str || '';
            return d.innerHTML;
        }

        loadMessages();
    </script>
</body>
</html>
